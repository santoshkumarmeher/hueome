<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hueome — Home Color Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy: #1A1F2E;
    --navy-light: #252B3B;
    --navy-mid: #2E3548;
    --canvas: #F7F3EE;
    --terracotta: #C4622D;
    --terracotta-light: #D97B47;
    --sage: #7A9E7E;
    --gold: #D4A843;
    --white: #FFFFFF;
    --text-main: #F0EDE8;
    --text-muted: #9AA3B5;
    --border: rgba(255,255,255,0.08);
    --panel-w: 340px;
  }

  html, body {
    height: 100%;
    font-family: 'Inter', sans-serif;
    background: var(--navy);
    color: var(--text-main);
    overflow: hidden;
  }

  /* ── HEADER ── */
  header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    height: 56px;
    background: rgba(26,31,46,0.95);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 24px;
  }
  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem; font-weight: 700;
    color: var(--white);
    letter-spacing: -0.02em;
  }
  .logo span { color: var(--terracotta); }
  .header-right { display: flex; gap: 10px; align-items: center; }

  .btn {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 8px 16px; border-radius: 8px;
    font-size: 0.82rem; font-weight: 500;
    cursor: pointer; border: none; transition: all 0.2s;
    font-family: 'Inter', sans-serif;
  }
  .btn-ghost {
    background: transparent; color: var(--text-muted);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { color: var(--text-main); border-color: rgba(255,255,255,0.2); }
  .btn-primary {
    background: var(--terracotta); color: white;
  }
  .btn-primary:hover { background: var(--terracotta-light); }
  .btn-sage { background: var(--sage); color: white; }
  .btn-sage:hover { filter: brightness(1.1); }

  /* ── LAYOUT ── */
  .app {
    display: flex;
    height: 100vh;
    padding-top: 56px;
  }

  /* ── LEFT PANEL ── */
  .panel {
    width: var(--panel-w);
    min-width: var(--panel-w);
    background: var(--navy-light);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    overflow-y: auto;
    overflow-x: hidden;
  }
  .panel::-webkit-scrollbar { width: 4px; }
  .panel::-webkit-scrollbar-track { background: transparent; }
  .panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .panel-section {
    padding: 20px;
    border-bottom: 1px solid var(--border);
  }
  .panel-label {
    font-size: 0.68rem; font-weight: 600; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--text-muted);
    margin-bottom: 14px;
  }

  /* View toggle */
  .view-toggle {
    display: flex; gap: 6px;
  }
  .view-btn {
    flex: 1; padding: 10px 6px;
    border-radius: 8px; border: 1px solid var(--border);
    background: transparent; color: var(--text-muted);
    font-size: 0.8rem; font-weight: 500;
    cursor: pointer; transition: all 0.2s;
    font-family: 'Inter', sans-serif;
    display: flex; flex-direction: column; align-items: center; gap: 5px;
  }
  .view-btn svg { width: 20px; height: 20px; }
  .view-btn.active {
    background: var(--navy-mid); color: var(--white);
    border-color: rgba(255,255,255,0.2);
  }

  /* Surface list */
  .surface-list { display: flex; flex-direction: column; gap: 6px; }
  .surface-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px; border-radius: 8px;
    cursor: pointer; border: 1px solid transparent;
    transition: all 0.18s;
  }
  .surface-item:hover { background: var(--navy-mid); }
  .surface-item.active {
    background: var(--navy-mid);
    border-color: var(--terracotta);
  }
  .surface-swatch {
    width: 24px; height: 24px; border-radius: 5px;
    border: 1px solid rgba(255,255,255,0.15);
    flex-shrink: 0;
    transition: background 0.3s;
  }
  .surface-name { font-size: 0.84rem; font-weight: 500; flex: 1; }
  .surface-hex { font-size: 0.72rem; color: var(--text-muted); font-family: monospace; }

  /* Color picker area */
  .color-picker-wrap {
    display: flex; flex-direction: column; gap: 14px;
  }
  .selected-surface-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.05rem; color: var(--white);
  }
  .selected-surface-title span { color: var(--terracotta); }

  input[type="color"] {
    width: 100%; height: 56px;
    border: none; border-radius: 10px;
    cursor: pointer; background: none;
    padding: 2px;
  }
  input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; border-radius: 8px; }
  input[type="color"]::-webkit-color-swatch { border: none; border-radius: 8px; }

  /* Palette presets */
  .palette-row {
    display: flex; flex-wrap: wrap; gap: 7px;
  }
  .palette-chip {
    width: 28px; height: 28px; border-radius: 6px;
    cursor: pointer; border: 2px solid transparent;
    transition: transform 0.15s, border-color 0.15s;
    flex-shrink: 0;
  }
  .palette-chip:hover { transform: scale(1.15); border-color: rgba(255,255,255,0.4); }

  /* Palette collections */
  .palette-collection { margin-bottom: 14px; }
  .collection-name {
    font-size: 0.7rem; font-weight: 600; letter-spacing: 0.08em;
    color: var(--text-muted); text-transform: uppercase; margin-bottom: 8px;
  }

  /* Share section */
  .share-box {
    background: var(--navy-mid);
    border-radius: 10px; padding: 14px;
    display: flex; flex-direction: column; gap: 10px;
  }
  .share-url {
    font-size: 0.73rem; color: var(--text-muted);
    word-break: break-all; font-family: monospace;
    background: rgba(0,0,0,0.2); padding: 8px 10px; border-radius: 6px;
    min-height: 36px; line-height: 1.5;
  }
  .share-actions { display: flex; gap: 8px; }
  .share-actions .btn { flex: 1; justify-content: center; font-size: 0.78rem; }

  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--sage); color: white;
    padding: 10px 20px; border-radius: 8px; font-size: 0.85rem; font-weight: 500;
    opacity: 0; transition: all 0.3s; z-index: 999;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* View-only banner */
  .view-banner {
    background: linear-gradient(90deg, var(--gold), var(--terracotta));
    padding: 9px 24px; font-size: 0.82rem; font-weight: 500;
    display: none; align-items: center; justify-content: space-between;
    gap: 10px;
  }
  .view-banner.show { display: flex; }

  /* ── RIGHT CANVAS ── */
  .canvas {
    flex: 1;
    background: var(--canvas);
    display: flex; align-items: center; justify-content: center;
    position: relative;
    overflow: hidden;
  }
  .canvas-bg-pattern {
    position: absolute; inset: 0;
    background-image: radial-gradient(circle, rgba(26,31,46,0.06) 1px, transparent 1px);
    background-size: 24px 24px;
  }

  .house-wrap {
    position: relative; z-index: 1;
    width: min(700px, 96%);
  }
  .house-wrap svg {
    width: 100%; height: auto;
    filter: drop-shadow(0 24px 60px rgba(26,31,46,0.18));
    transition: opacity 0.35s;
  }

  /* SVG surface hover */
  .clickable-surface {
    cursor: pointer;
    transition: filter 0.2s, opacity 0.2s;
  }
  .clickable-surface:hover { filter: brightness(1.08); }
  .clickable-surface.selected { filter: brightness(1.12); stroke-width: 3 !important; }

  /* Canvas labels */
  .canvas-view-label {
    position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
    background: rgba(26,31,46,0.75); backdrop-filter: blur(8px);
    padding: 6px 14px; border-radius: 20px;
    font-size: 0.75rem; font-weight: 500; color: var(--text-main);
    letter-spacing: 0.06em; text-transform: uppercase;
  }

  .surface-tooltip {
    position: absolute; pointer-events: none;
    background: var(--navy); color: var(--white);
    padding: 5px 10px; border-radius: 6px; font-size: 0.75rem;
    opacity: 0; transition: opacity 0.15s; z-index: 50;
    white-space: nowrap;
  }
  .surface-tooltip.show { opacity: 1; }

  /* Hidden interior/exterior */
  .house-exterior, .house-interior {
    transition: opacity 0.4s;
  }

  @media (max-width: 820px) {
    :root { --panel-w: 290px; }
    html, body { overflow: auto; }
    .app { flex-direction: column; height: auto; overflow: auto; }
    .panel { width: 100%; min-width: 0; max-height: none; overflow: visible; }
    .canvas { min-height: 60vw; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">Hue<span>ome</span></div>
  <div class="header-right">
    <button class="btn btn-ghost" id="resetBtn">↺ Reset</button>
    <button class="btn btn-primary" id="shareBtn">⬡ Share Design</button>
  </div>
</header>

<div class="view-banner" id="viewBanner">
  <span>👁 Viewing a shared color design — make your own changes and share a new link!</span>
  <button class="btn btn-primary" id="editMineBtn" style="white-space:nowrap">Edit My Copy</button>
</div>

<div class="app">
  <!-- LEFT PANEL -->
  <div class="panel">

    <!-- View mode -->
    <div class="panel-section">
      <div class="panel-label">View</div>
      <div class="view-toggle">
        <button class="view-btn active" id="extBtn" onclick="setView('exterior')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 10.5L12 3l9 7.5V21H3V10.5z"/><rect x="9" y="14" width="6" height="7" rx="0.5"/></svg>
          Exterior
        </button>
        <button class="view-btn" id="intBtn" onclick="setView('interior')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="4" width="20" height="16" rx="1"/><line x1="8" y1="4" x2="8" y2="20"/><line x1="16" y1="4" x2="16" y2="20"/><line x1="2" y1="12" x2="22" y2="12"/></svg>
          Interior
        </button>
      </div>
    </div>

    <!-- Surfaces -->
    <div class="panel-section">
      <div class="panel-label">Surfaces</div>
      <div class="surface-list" id="surfaceList"></div>
    </div>

    <!-- Color picker -->
    <div class="panel-section">
      <div class="panel-label">Color Picker</div>
      <div class="color-picker-wrap">
        <div class="selected-surface-title">Editing: <span id="activeSurfaceName">—</span></div>
        <input type="color" id="colorPicker" value="#C4622D" oninput="onColorPick(this.value)">
        <div>
          <div class="panel-label" style="margin-bottom:10px">Curated Palettes</div>
          <div id="palettesContainer"></div>
        </div>
      </div>
    </div>

    <!-- Share -->
    <div class="panel-section">
      <div class="panel-label">Share</div>
      <div class="share-box">
        <div style="font-size:0.8rem;color:var(--text-muted)">Generate a shareable link with your current color selections.</div>
        <div class="share-url" id="shareUrl">Click "Share Design" above to generate a link.</div>
        <div class="share-actions">
          <button class="btn btn-primary" onclick="generateShareLink()">Generate Link</button>
          <button class="btn btn-ghost" id="copyBtn" onclick="copyLink()">Copy</button>
        </div>
      </div>
    </div>

  </div><!-- /panel -->

  <!-- RIGHT CANVAS -->
  <div class="canvas" id="mainCanvas">
    <div class="canvas-bg-pattern"></div>
    <div class="canvas-view-label" id="canvasLabel">Exterior — Corner View</div>

    <div class="house-wrap" id="houseWrap">
      <!-- SVG injected by JS -->
    </div>

    <div class="surface-tooltip" id="tooltip"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ═══════════════════════════════════════════
   STATE
═══════════════════════════════════════════ */
let currentView = 'exterior';
let activeSurface = null;
let isViewOnly = false;

const EXTERIOR_SURFACES = [
  { id: 'ext_wall_front', label: 'Front Wall',       default: '#EAE4DC', group: 'ext' },
  { id: 'ext_wall_side',  label: 'Side Wall',         default: '#D5CEC5', group: 'ext' },
  { id: 'ext_roof_top',   label: 'Flat Roof / Top',   default: '#4A5568', group: 'ext' },
  { id: 'ext_roof_over',  label: 'Roof Overhang',     default: '#CBD5E1', group: 'ext' },
  { id: 'ext_upper_band', label: 'Upper Cladding',    default: '#2D3748', group: 'ext' },
  { id: 'ext_door',       label: 'Front Door',        default: '#1A202C', group: 'ext' },
  { id: 'ext_window',     label: 'Window Glass',      default: '#93C5FD', group: 'ext' },
  { id: 'ext_frame',      label: 'Window Frames',     default: '#F1F5F9', group: 'ext' },
  { id: 'ext_garage',     label: 'Garage Door',       default: '#94A3B8', group: 'ext' },
  { id: 'ext_column',     label: 'Columns / Pillars', default: '#F8FAFC', group: 'ext' },
  { id: 'ext_path',       label: 'Driveway / Path',   default: '#C8C0B4', group: 'ext' },
  { id: 'ext_grass',      label: 'Lawn',              default: '#6B9E6B', group: 'ext' },
];

const INTERIOR_SURFACES = [
  { id: 'int_walls',     label: 'Wall Color',       default: '#F2EBE0', group: 'int' },
  { id: 'int_ceiling',   label: 'Ceiling',          default: '#FAF7F4', group: 'int' },
  { id: 'int_floor',     label: 'Floor / Rug',      default: '#C4A882', group: 'int' },
  { id: 'int_trim',      label: 'Skirting & Trim',  default: '#EDE5DA', group: 'int' },
  { id: 'int_sofa',      label: 'Sofa',             default: '#8B6F57', group: 'int' },
  { id: 'int_table',     label: 'Table / Cabinet',  default: '#6B4F3A', group: 'int' },
  { id: 'int_accent',    label: 'Accent Wall',      default: '#C4622D', group: 'int' },
  { id: 'int_window',    label: 'Curtains',         default: '#D4C4B0', group: 'int' },
];

const PALETTES = [
  { name: 'Warm Nordic', colors: ['#E8DDD0','#C4A882','#5C4A3A','#3D2B1F','#7A9E7E','#D4A843','#F5EEE6','#BEB5AA'] },
  { name: 'Modern Slate', colors: ['#94A3B8','#475569','#1E293B','#F8FAFC','#CBD5E1','#334155','#64748B','#E2E8F0'] },
  { name: 'Desert Clay', colors: ['#C4622D','#D97B47','#8B6F57','#E8D5C0','#A0785A','#F2E5D4','#6B4F3A','#B8956A'] },
  { name: 'Sage Garden', colors: ['#7A9E7E','#4F7A52','#2D5A30','#A8C5AB','#D4E8D5','#3D6B3F','#6B9B6E','#E8F4E8'] },
  { name: 'Midnight Blue', colors: ['#1A1F2E','#252B3B','#2E3548','#4A5568','#6B7280','#9AA3B5','#C5CAD4','#E8EBF0'] },
  { name: 'Blush Luxe', colors: ['#E8C4B8','#D4927A','#B5614A','#F5E6E0','#C4927A','#8B4A3A','#F0D0C5','#7A3828'] },
];

// Initialize colors from all surfaces
const colors = {};
[...EXTERIOR_SURFACES, ...INTERIOR_SURFACES].forEach(s => { colors[s.id] = s.default; });

/* ═══════════════════════════════════════════
   URL / STATE MANAGEMENT
═══════════════════════════════════════════ */
function encodeState() {
  const data = { v: currentView, c: colors };
  return btoa(encodeURIComponent(JSON.stringify(data)));
}

function decodeState(encoded) {
  try {
    return JSON.parse(decodeURIComponent(atob(encoded)));
  } catch { return null; }
}

function generateShareLink() {
  const hash = encodeState();
  const url = `${location.origin}${location.pathname}?view=${hash}`;
  document.getElementById('shareUrl').textContent = url;
  return url;
}

function copyLink() {
  const url = generateShareLink();
  navigator.clipboard.writeText(url).then(() => showToast('Link copied to clipboard!'));
}

function loadFromUrl() {
  const params = new URLSearchParams(location.search);
  const viewParam = params.get('view');
  if (!viewParam) return;

  const state = decodeState(viewParam);
  if (!state) return;

  // Apply colors
  Object.assign(colors, state.c || {});
  isViewOnly = true;

  // Show banner
  document.getElementById('viewBanner').classList.add('show');

  // Set view
  if (state.v) currentView = state.v;
}

document.getElementById('editMineBtn').onclick = () => {
  // Strip the ?view= param so they get a fresh editing session with same colors
  history.replaceState(null, '', location.pathname);
  document.getElementById('viewBanner').classList.remove('show');
  isViewOnly = false;
  showToast('Now editing your own copy!');
};

document.getElementById('shareBtn').onclick = () => {
  const url = generateShareLink();
  navigator.clipboard.writeText(url).then(() => showToast('Share link copied!')).catch(() => {});
};

document.getElementById('resetBtn').onclick = () => {
  [...EXTERIOR_SURFACES, ...INTERIOR_SURFACES].forEach(s => { colors[s.id] = s.default; });
  renderSurfaces();
  applyColorsToSvg();
  showToast('Colors reset to defaults');
};

/* ═══════════════════════════════════════════
   UI: SURFACES PANEL
═══════════════════════════════════════════ */
function renderSurfaces() {
  const list = document.getElementById('surfaceList');
  list.innerHTML = '';
  const surfaces = currentView === 'exterior' ? EXTERIOR_SURFACES : INTERIOR_SURFACES;

  surfaces.forEach(s => {
    const div = document.createElement('div');
    div.className = 'surface-item' + (activeSurface === s.id ? ' active' : '');
    div.innerHTML = `
      <div class="surface-swatch" style="background:${colors[s.id]}"></div>
      <span class="surface-name">${s.label}</span>
      <span class="surface-hex">${colors[s.id]}</span>
    `;
    div.onclick = () => selectSurface(s.id);
    list.appendChild(div);
  });

  if (activeSurface) {
    document.getElementById('colorPicker').value = colors[activeSurface] || '#ffffff';
    const s = [...EXTERIOR_SURFACES, ...INTERIOR_SURFACES].find(x => x.id === activeSurface);
    if (s) document.getElementById('activeSurfaceName').textContent = s.label;
  }
}

function selectSurface(id) {
  activeSurface = id;
  const s = [...EXTERIOR_SURFACES, ...INTERIOR_SURFACES].find(x => x.id === id);
  if (s) {
    document.getElementById('activeSurfaceName').textContent = s.label;
    document.getElementById('colorPicker').value = colors[id];
  }
  renderSurfaces();
  highlightSvgSurface(id);
}

function onColorPick(val) {
  if (!activeSurface) {
    const surfaces = currentView === 'exterior' ? EXTERIOR_SURFACES : INTERIOR_SURFACES;
    if (surfaces.length) selectSurface(surfaces[0].id);
    else return;
  }
  colors[activeSurface] = val;
  renderSurfaces();
  applyColorsToSvg();
}

/* ═══════════════════════════════════════════
   UI: PALETTES
═══════════════════════════════════════════ */
function renderPalettes() {
  const container = document.getElementById('palettesContainer');
  container.innerHTML = '';
  PALETTES.forEach(p => {
    const row = document.createElement('div');
    row.className = 'palette-collection';
    row.innerHTML = `<div class="collection-name">${p.name}</div><div class="palette-row"></div>`;
    const chipRow = row.querySelector('.palette-row');
    p.colors.forEach(c => {
      const chip = document.createElement('div');
      chip.className = 'palette-chip';
      chip.style.background = c;
      chip.title = c;
      chip.onclick = () => {
        if (!activeSurface) {
          const surfaces = currentView === 'exterior' ? EXTERIOR_SURFACES : INTERIOR_SURFACES;
          if (surfaces.length) selectSurface(surfaces[0].id);
        }
        if (activeSurface) {
          colors[activeSurface] = c;
          document.getElementById('colorPicker').value = c;
          renderSurfaces();
          applyColorsToSvg();
        }
      };
      chipRow.appendChild(chip);
    });
    container.appendChild(row);
  });
}

/* ═══════════════════════════════════════════
   VIEW SWITCH
═══════════════════════════════════════════ */
function setView(v) {
  currentView = v;
  activeSurface = null;
  document.getElementById('activeSurfaceName').textContent = '—';
  document.getElementById('extBtn').classList.toggle('active', v === 'exterior');
  document.getElementById('intBtn').classList.toggle('active', v === 'interior');
  document.getElementById('canvasLabel').textContent = v === 'exterior' ? 'Exterior — Corner View' : 'Interior View';

  renderHouse();
  renderSurfaces();
}

/* ═══════════════════════════════════════════
   TOAST
═══════════════════════════════════════════ */
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

/* ═══════════════════════════════════════════
   ISO HELPERS — cabinet/corner projection
   Origin corner = (ox, oy). X goes right-down,
   Z goes left-down, Y goes straight up.
   sx = x-scale, sz = z-scale, sy = y-scale
═══════════════════════════════════════════ */
const ISO = {
  // unit vectors (per pixel of model space)
  // Front face: x-axis goes right+down, y-axis goes straight up
  // Side face:  z-axis goes left+down,  y-axis goes straight up
  // Top face:   x-axis + z-axis
  ox: 310, oy: 390,   // ground-level corner point (front-right corner of house)
  sx: 0.82, sy: 0.42, // horizontal scale and vertical drop per unit right/left
  hx: 0, hy: 1,       // up direction (y in screen space, negative = up)
};

function pt(rx, rz, ry) {
  // rx = rightward along front face width
  // rz = leftward along side face depth
  // ry = upward height
  const sx = ISO.sx, sy = ISO.sy;
  const x = ISO.ox + rx * sx - rz * sx;
  const y = ISO.oy - rx * sy - rz * sy - ry;
  return `${x.toFixed(2)},${y.toFixed(2)}`;
}

function poly(pts, fill, cls, id, extra='') {
  const points = pts.map(([rx,rz,ry])=>pt(rx,rz,ry)).join(' ');
  return `<polygon points="${points}" fill="${fill}" class="${cls}" ${id?`data-id="${id}" onclick="selectSurface('${id}')"`:''}  ${extra}/>`;
}

/* ═══════════════════════════════════════════
   SVG: EXTERIOR HOUSE — Isometric Corner View
   Modern flat-roof villa, front+right-side visible
═══════════════════════════════════════════ */
function buildExteriorSvg() {
  // House dimensions in model units
  const W = 220;   // front width
  const D = 140;   // side depth
  const H = 140;   // main wall height
  const OH = 14;   // roof overhang thickness
  const OW = 12;   // overhang protrusion front
  const OD = 10;   // overhang protrusion side

  // Upper cladding band (top portion of wall)
  const bandH = 42;
  const bandY = H - bandH;  // starts at this height

  // Garage wing: left side of front face
  const GW = 80;  // garage width
  const GH = 90;  // garage height
  const GD = D;   // same depth

  // Story 2 box (right side upper)
  const S2x = GW + 10;
  const S2w = W - GW - 10;
  const S2h = 46;

  // Ground level
  const gnd = 0;

  const c = colors;

  // Shading factors: front is brighter, side is darker
  const frontWall   = c.ext_wall_front;
  const sideWall    = hexDarken(c.ext_wall_side, 18);
  const topRoof     = hexDarken(c.ext_roof_top, 5);
  const overhang    = c.ext_roof_over;
  const upperBandF  = c.ext_upper_band;
  const upperBandS  = hexDarken(c.ext_upper_band, 22);
  const grassC      = c.ext_grass;
  const pathC       = c.ext_path;
  const doorC       = c.ext_door;
  const winGlass    = c.ext_window;
  const winFrame    = c.ext_frame;
  const garageC     = c.ext_garage;
  const columnC     = c.ext_column;

  // Ground shadow ellipse under house
  function groundShadow() {
    const corners = [[0,0],[W,0],[W,D],[0,D]];
    const xs = corners.map(([rx,rz])=>{
      const x = ISO.ox + rx*ISO.sx - rz*ISO.sx;
      return x;
    });
    const ys = corners.map(([rx,rz])=>{
      const y = ISO.oy - rx*ISO.sy - rz*ISO.sy;
      return y;
    });
    return `<ellipse cx="${((Math.min(...xs)+Math.max(...xs))/2).toFixed(0)}" cy="${((Math.min(...ys)+Math.max(...ys))/2+22).toFixed(0)}" rx="210" ry="38" fill="rgba(0,0,0,0.13)"/>`;
  }

  // ISO parallelogram face helpers
  // Front face rect: from (rx0,rz,ry0) with width dw along X, height dh along Y
  function frontFaceRect(rx, rz, ry, dw, dh, fill, cls, id, extra='') {
    return poly([[rx,rz,ry],[rx+dw,rz,ry],[rx+dw,rz,ry+dh],[rx,rz,ry+dh]], fill, cls, id, extra);
  }
  // Side face rect: from (rx,rz0,ry) with depth dd along Z, height dh along Y
  function sideFaceRect(rx, rz, ry, dd, dh, fill, cls, id, extra='') {
    return poly([[rx,rz,ry],[rx,rz+dd,ry],[rx,rz+dd,ry+dh],[rx,rz,ry+dh]], fill, cls, id, extra);
  }
  // Top face: from (rx,rz,ry) spanning dw in X and dd in Z
  function topFaceRect(rx, rz, ry, dw, dd, fill, cls, id, extra='') {
    return poly([[rx,rz,ry],[rx+dw,rz,ry],[rx+dw,rz+dd,ry],[rx,rz+dd,ry]], fill, cls, id, extra);
  }

  // Isometric window on FRONT face
  function isoWinFront(rx, rz, ry, dw, dh) {
    const frameW = winFrame;
    const glass  = winGlass;
    const fThk = 4;
    return `
      <g class="clickable-surface" data-id="ext_window" onclick="selectSurface('ext_window')">
        ${frontFaceRect(rx, rz, ry, dw, dh, frameW, 'clickable-surface', 'ext_frame')}
        ${frontFaceRect(rx+fThk, rz-0.01, ry+fThk, dw-fThk*2, dh-fThk*2, glass, 'clickable-surface', 'ext_window')}
        <!-- vertical mullion -->
        ${poly([[rx+dw/2-1.5,rz-0.02,ry+fThk],[rx+dw/2+1.5,rz-0.02,ry+fThk],[rx+dw/2+1.5,rz-0.02,ry+dh-fThk],[rx+dw/2-1.5,rz-0.02,ry+dh-fThk]], frameW, '', null)}
        <!-- horizontal mullion -->
        ${poly([[rx+fThk,rz-0.02,ry+dh/2-1],[rx+dw-fThk,rz-0.02,ry+dh/2-1],[rx+dw-fThk,rz-0.02,ry+dh/2+2],[rx+fThk,rz-0.02,ry+dh/2+2]], frameW, '', null)}
        <!-- reflection -->
        ${poly([[rx+fThk+3,rz-0.03,ry+fThk+3],[rx+fThk+12,rz-0.03,ry+fThk+3],[rx+fThk+12,rz-0.03,ry+fThk+18],[rx+fThk+3,rz-0.03,ry+fThk+18]], 'rgba(255,255,255,0.28)', '', null)}
      </g>`;
  }

  // Isometric window on SIDE face
  function isoWinSide(rx, rz, ry, dd, dh) {
    const frameW = winFrame;
    const glass  = winGlass;
    const fThk = 4;
    return `
      <g class="clickable-surface" data-id="ext_window" onclick="selectSurface('ext_window')">
        ${sideFaceRect(rx, rz, ry, dd, dh, frameW, 'clickable-surface', 'ext_frame')}
        ${sideFaceRect(rx+0.01, rz+fThk, ry+fThk, dd-fThk*2, dh-fThk*2, glass, 'clickable-surface', 'ext_window')}
        ${poly([[rx+0.02,rz+dd/2-1,ry+fThk],[rx+0.02,rz+dd/2+2,ry+fThk],[rx+0.02,rz+dd/2+2,ry+dh-fThk],[rx+0.02,rz+dd/2-1,ry+dh-fThk]], frameW, '', null)}
        ${poly([[rx+0.02,rz+fThk,ry+dh/2-1],[rx+0.02,rz+dd-fThk,ry+dh/2-1],[rx+0.02,rz+dd-fThk,ry+dh/2+2],[rx+0.02,rz+fThk,ry+dh/2+2]], frameW, '', null)}
        ${poly([[rx+0.03,rz+fThk+3,ry+fThk+3],[rx+0.03,rz+fThk+12,ry+fThk+3],[rx+0.03,rz+fThk+12,ry+fThk+16],[rx+0.03,rz+fThk+3,ry+fThk+16]], 'rgba(255,255,255,0.22)', '', null)}
      </g>`;
  }

  // Isometric door on FRONT face
  function isoDoor(rx, rz, ry, dw, dh) {
    const dc = doorC;
    const fThk = 5;
    return `
      <g class="clickable-surface" data-id="ext_door" onclick="selectSurface('ext_door')">

        ${frontFaceRect(rx+fThk, rz-0.01, ry+fThk, dw-fThk*2, dh-fThk-2, hexLighten(dc,8), '', null)}
        <!-- door panel upper -->
        ${poly([[rx+fThk+3,rz-0.02,ry+fThk+3],[rx+dw/2-2,rz-0.02,ry+fThk+3],[rx+dw/2-2,rz-0.02,ry+dh*0.5],[rx+fThk+3,rz-0.02,ry+dh*0.5]], hexLighten(dc,15), '', null, 'opacity="0.35"')}
        <!-- door panel lower -->
        ${poly([[rx+dw/2+2,rz-0.02,ry+fThk+3],[rx+dw-fThk-3,rz-0.02,ry+fThk+3],[rx+dw-fThk-3,rz-0.02,ry+dh*0.5],[rx+dw/2+2,rz-0.02,ry+dh*0.5]], hexLighten(dc,15), '', null, 'opacity="0.35"')}
        <!-- handle -->
        ${poly([[rx+dw*0.72,rz-0.03,ry+dh*0.45],[rx+dw*0.72+4,rz-0.03,ry+dh*0.45],[rx+dw*0.72+4,rz-0.03,ry+dh*0.58],[rx+dw*0.72,rz-0.03,ry+dh*0.58]], hexLighten(dc,50), '', null, 'opacity="0.9"')}
        <!-- transom -->
        ${frontFaceRect(rx, rz-0.01, ry+dh, dw, 10, hexLighten(winGlass,20), '', null, 'opacity="0.7"')}
      </g>`;
  }

  // Pillar / column on front face
  function isoColumn(rx, rz, ry, dw, dh) {

        ${topFaceRect(rx, rz, ry+dh, dw+2, 6, hexLighten(columnC,10), '', null)}

  }

  return `

/* ═══════════════════════════════════════════
   COLOR HELPERS
═══════════════════════════════════════════ */
function hexToRgb(hex) {
  const h = hex.replace('#','');
  const n = parseInt(h.length===3 ? h.split('').map(c=>c+c).join('') : h, 16);
  return [(n>>16)&255,(n>>8)&255,n&255];
}
function rgbToHex(r,g,b) {
  return '#'+[r,g,b].map(v=>Math.max(0,Math.min(255,v)).toString(16).padStart(2,'0')).join('');
}
function hexDarken(hex, amt) {
  try { const [r,g,b]=hexToRgb(hex); return rgbToHex(r-amt,g-amt,b-amt); } catch { return hex; }
}
function hexLighten(hex, amt) {
  try { const [r,g,b]=hexToRgb(hex); return rgbToHex(r+amt,g+amt,b+amt); } catch { return hex; }
}

/* ═══════════════════════════════════════════
   RENDER
═══════════════════════════════════════════ */
function renderHouse() {
  const wrap = document.getElementById('houseWrap');
  wrap.innerHTML = currentView === 'exterior' ? buildExteriorSvg() : buildInteriorSvg();
  attachSvgTooltips();
  if (activeSurface) highlightSvgSurface(activeSurface);
}

function applyColorsToSvg() {
  renderHouse();
}

function highlightSvgSurface(id) {
  const svg = document.getElementById('houseSvg');
  if (!svg) return;
  svg.querySelectorAll('.clickable-surface').forEach(el => {
    el.classList.remove('selected');
    el.style.outline = '';
  });
  svg.querySelectorAll(`[data-id="${id}"]`).forEach(el => {
    el.classList.add('selected');
  });
}

function attachSvgTooltips() {
  const svg = document.getElementById('houseSvg');
  const tooltip = document.getElementById('tooltip');
  if (!svg) return;

  svg.querySelectorAll('.clickable-surface').forEach(el => {
    el.addEventListener('mouseenter', (e) => {
      const id = el.dataset.id;
      const s = [...EXTERIOR_SURFACES,...INTERIOR_SURFACES].find(x=>x.id===id);
      if (s) {
        tooltip.textContent = s.label + ' — click to select';
        tooltip.classList.add('show');
      }
    });
    el.addEventListener('mousemove', (e) => {
      const rect = document.getElementById('mainCanvas').getBoundingClientRect();
      tooltip.style.left = (e.clientX - rect.left + 12) + 'px';
      tooltip.style.top = (e.clientY - rect.top - 30) + 'px';
    });
    el.addEventListener('mouseleave', () => tooltip.classList.remove('show'));
  });
}
